name: Build Signed Release APK

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore (if secret exists)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > app/memosyou.jks
            echo "ANDROID_SIGNING_STORE_FILE=memosyou.jks" >> $GITHUB_ENV
            echo "ANDROID_SIGNING_STORE_PASSWORD=$KS_PASS" >> $GITHUB_ENV
            echo "ANDROID_SIGNING_KEY_ALIAS=$KS_ALIAS" >> $GITHUB_ENV
            echo "ANDROID_SIGNING_KEY_PASSWORD=$KEY_PASS" >> $GITHUB_ENV
            echo "Keystore decoded, signing enabled"
          else
            echo "No keystore, building unsigned APK"
          fi

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Prepare APK Artifact
        run: |
          # Prefer signed APK, fall back to unsigned
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          if [ ! -f "$APK" ]; then
            echo "❌ No APK found!"
            ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No apk dir"
            exit 1
          fi
          echo "📦 Using APK: $APK"
          cp "$APK" memosyou-release.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: memosyou-artifact
          path: memosyou-release.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: memosyou-release.apk
          name: "MemosYou ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
